service: thecitynook-serverless

provider:
  name: aws
  runtime: nodejs18.x
  stage: ${opt:stage}
  region: ${opt:region}
  profile: hoistin
  httpApi:
    cors:
      allowedOrigins:
        - "https://www.thecitynook.com"
        - "https://thecitynook.com"
      allowedMethods:
        - GET
        - POST
        - OPTIONS
      allowedHeaders:
        - Content-Type
        - Key
        - Authorization
      maxAge: 3600

plugins:
  - serverless-offline
  - serverless-plugin-typescript

functions:
  hello:
    handler: src/handlers/hello.handler
    events:
      - httpApi:
          path: /hello
          method: get
  reservationEnquiry:
    handler: src/handlers/reservationEnquiry.handler
    events:
      - httpApi:
          path: /reservation-enquiry
          method: post
  availableDates:
    handler: src/handlers/availableDates.handler
    timeout: 10
    events:
      - httpApi:
          path: /available-dates
          method: get
  preflightAvailableDates:
    handler: src/handlers/preflight.handler
    events:
      - httpApi:
          path: /available-dates
          method: options
  preflightReservationEnquiry:
    handler: src/handlers/preflight.handler
    events:
      - httpApi:
          path: /reservation-enquiry
          method: options
  login:
    handler: src/handlers/login.handler
    events:
      - httpApi:
          path: /login
          method: post
  preflightLogin:
    handler: src/handlers/preflight.handler
    events:
      - httpApi:
          path: /login
          method: options
  syncCalendar:
    handler: src/handlers/syncCalendar.handler
    timeout: 30
    events:
      - schedule:
          rate: rate(1 hour)
          enabled: true
  createDefaultAdmin:
    handler: src/handlers/createDefaultAdmin.handler
    events:
      - httpApi:
          path: /create-default-admin
          method: post
  preflightCreateDefaultAdmin:
    handler: src/handlers/preflight.handler
    events:
      - httpApi:
          path: /create-default-admin
          method: options
  user:
    handler: src/handlers/user.handler
    events:
      - httpApi:
          path: /user
          method: get
  preflightUser:
    handler: src/handlers/preflight.handler
    events:
      - httpApi:
          path: /user
          method: options
  seriousEnquiry:
    handler: src/handlers/seriousEnquiry.handler
    events:
      - httpApi:
          path: /enquiry/serious
          method: post
  preflightSeriousEnquiry:
    handler: src/handlers/preflight.handler
    events:
      - httpApi:
          path: /enquiry/serious
          method: options
  enquiries:
    handler: src/handlers/enquiries.handler
    events:
      - httpApi:
          path: /enquiries
          method: get
  preflightEnquiries:
    handler: src/handlers/preflight.handler
    events:
      - httpApi:
          path: /enquiries
          method: options
