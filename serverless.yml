service: thecitynook-serverless

provider:
  name: aws
  runtime: nodejs18.x
  stage: ${opt:stage}
  region: ${opt:region}
  profile: hoistin
  httpApi:
    cors:
      allowedOrigins:
        - "https://www.thecitynook.com"
        - "https://thecitynook.com"
      allowedMethods:
        - GET
        - POST
        - OPTIONS
      allowedHeaders:
        - Content-Type
        - Key
      maxAge: 3600

plugins:
  - serverless-offline
  - serverless-plugin-typescript

functions:
  hello:
    handler: src/handlers/hello.handler
    events:
      - httpApi:
          path: /hello
          method: get
  reservationEnquiry:
    handler: src/handlers/reservationEnquiry.handler
    events:
      - httpApi:
          path: /reservation-enquiry
          method: post
  availableDates:
    handler: src/handlers/availableDates.handler
    timeout: 10
    events:
      - httpApi:
          path: /available-dates
          method: get
  preflightAvailableDates:
    handler: src/handlers/preflight.handler
    events:
      - httpApi:
          path: /available-dates
          method: options
  preflightReservationEnquiry:
    handler: src/handlers/preflight.handler
    events:
      - httpApi:
          path: /reservation-enquiry
          method: options
  syncCalendar:
    handler: src/handlers/syncCalendar.handler
    timeout: 30
    events:
      - schedule:
          rate: rate(1 hour)
          enabled: true
