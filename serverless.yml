service: thecitynook-serverless

provider:
  name: aws
  runtime: nodejs22.x
  stage: ${opt:stage}
  region: ${opt:region}
  profile: hoistin
  environment:
    DB_CONNECTION_STRING: ${env:DB_CONNECTION_STRING}
    SES_KEY: ${env:SES_KEY}
    SES_ACCESS_KEY: ${env:SES_ACCESS_KEY}
    SES_REGION: ${env:SES_REGION}
    RECAPTCHA_SECRET_KEY: ${env:RECAPTCHA_SECRET_KEY}
    PORT: ${env:PORT}
    NODE_ENV: ${env:NODE_ENV}
    STAYBOARD_S3_BUCKET: ${env:STAYBOARD_S3_BUCKET}
    STAYBOARD_AWS_REGION: ${env:STAYBOARD_AWS_REGION}
    STAYBOARD_AWS_ACCESS_KEY_ID: ${env:STAYBOARD_AWS_ACCESS_KEY_ID}
    STAYBOARD_AWS_SECRET_ACCESS_KEY: ${env:STAYBOARD_AWS_SECRET_ACCESS_KEY}
    STAYBOARD_FIREBASE_PROJECT_ID: ${env:STAYBOARD_FIREBASE_PROJECT_ID}
    STAYBOARD_FIREBASE_CLIENT_EMAIL: ${env:STAYBOARD_FIREBASE_CLIENT_EMAIL}
    STAYBOARD_FIREBASE_PRIVATE_KEY: ${env:STAYBOARD_FIREBASE_PRIVATE_KEY}
    STAYBOARD_DYNAMO_TABLE: stayboard-${opt:stage}
    STAYBOARD_DYNAMO_ENDPOINT: ${env:STAYBOARD_DYNAMO_ENDPOINT, ''}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:DeleteItem
            - dynamodb:UpdateItem
            - dynamodb:Query
          Resource:
            - Fn::GetAtt:
                - StayboardDynamoTable
                - Arn
  httpApi:
    cors:
      allowedOrigins:
        - "https://www.thecitynook.com"
        - "https://thecitynook.com"
      allowedMethods:
        - GET
        - POST
        - OPTIONS
      allowedHeaders:
        - Content-Type
        - Key
        - Authorization
      maxAge: 3600

plugins:
  - serverless-offline

build:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node22
    platform: node
    external:
      - sharp

functions:
  hello:
    handler: src/handlers/hello.handler
    events:
      - httpApi:
          path: /hello
          method: get
  reservationEnquiry:
    handler: src/handlers/reservationEnquiry.handler
    events:
      - httpApi:
          path: /reservation-enquiry
          method: post
  availableDates:
    handler: src/handlers/availableDates.handler
    timeout: 10
    events:
      - httpApi:
          path: /available-dates
          method: get
  preflightAvailableDates:
    handler: src/handlers/preflight.handler
    events:
      - httpApi:
          path: /available-dates
          method: options
  preflightReservationEnquiry:
    handler: src/handlers/preflight.handler
    timeout: 30
    events:
      - httpApi:
          path: /reservation-enquiry
          method: options
  login:
    handler: src/handlers/login.handler
    events:
      - httpApi:
          path: /login
          method: post
  preflightLogin:
    handler: src/handlers/preflight.handler
    events:
      - httpApi:
          path: /login
          method: options
  syncCalendar:
    handler: src/handlers/syncCalendar.handler
    timeout: 30
    events:
      - schedule:
          rate: rate(1 hour)
          enabled: true
      # - httpApi:
      #     path: /sync-calendar
      #     method: get
  createDefaultAdmin:
    handler: src/handlers/createDefaultAdmin.handler
    events:
      - httpApi:
          path: /create-default-admin
          method: post
  preflightCreateDefaultAdmin:
    handler: src/handlers/preflight.handler
    events:
      - httpApi:
          path: /create-default-admin
          method: options
  user:
    handler: src/handlers/user.handler
    events:
      - httpApi:
          path: /user
          method: get
  preflightUser:
    handler: src/handlers/preflight.handler
    events:
      - httpApi:
          path: /user
          method: options
  seriousEnquiry:
    handler: src/handlers/seriousEnquiry.handler
    events:
      - httpApi:
          path: /enquiry/serious
          method: post
  preflightSeriousEnquiry:
    handler: src/handlers/preflight.handler
    events:
      - httpApi:
          path: /enquiry/serious
          method: options
  enquiries:
    handler: src/handlers/enquiries.handler
    events:
      - httpApi:
          path: /enquiries
          method: get
  preflightEnquiries:
    handler: src/handlers/preflight.handler
    events:
      - httpApi:
          path: /enquiries
          method: options
  sendMessage:
    handler: src/handlers/sendMessage.handler
    events:
      - httpApi:
          path: /send-message
          method: post
  preflightSendMessage:
    handler: src/handlers/preflight.handler
    events:
      - httpApi:
          path: /send-message
          method: options
  appLogin:
    handler: src/handlers/stayboard/login.handler
    events:
      - httpApi:
          path: /api/app/auth/login
          method: post
  appSignup:
    handler: src/handlers/stayboard/signup.handler
    events:
      - httpApi:
          path: /api/app/auth/signup
          method: post
  appMe:
    handler: src/handlers/stayboard/users.meHandler
    events:
      - httpApi:
          path: /api/app/me
          method: get
  appStaffList:
    handler: src/handlers/stayboard/users.listStaffHandler
    events:
      - httpApi:
          path: /api/app/staff
          method: get
  appStaffCreate:
    handler: src/handlers/stayboard/users.createStaffHandler
    events:
      - httpApi:
          path: /api/app/staff
          method: post
  appDeleteAccountRequest:
    handler: src/handlers/stayboard/deleteAccount.requestDeleteHandler
    events:
      - httpApi:
          path: /api/app/account/delete-request
          method: post
  appRegisterDevice:
    handler: src/handlers/stayboard/registerDevice.handler
    events:
      - httpApi:
          path: /api/app/devices/register
          method: post
  appDashboard:
    handler: src/handlers/stayboard/dashboard.handler
    events:
      - httpApi:
          path: /api/app/dashboard
          method: get
  appListingsGet:
    handler: src/handlers/stayboard/listings.getHandler
    events:
      - httpApi:
          path: /api/app/listings
          method: get
  appListingsPost:
    handler: src/handlers/stayboard/listings.postHandler
    events:
      - httpApi:
          path: /api/app/listings
          method: post
  appListingUpdate:
    handler: src/handlers/stayboard/listings.updateHandler
    events:
      - httpApi:
          path: /api/app/listings/{id}
          method: put
  appListingChecklistUpdate:
    handler: src/handlers/stayboard/listings.updateChecklistHandler
    events:
      - httpApi:
          path: /api/app/listings/{id}/checklist
          method: put
  appListingChecklistCopy:
    handler: src/handlers/stayboard/listings.copyChecklistHandler
    events:
      - httpApi:
          path: /api/app/listings/{id}/checklist/copy
          method: post
  appListingDetail:
    handler: src/handlers/stayboard/listingDetail.handler
    events:
      - httpApi:
          path: /api/app/listings/{id}
          method: get
  appListingDelete:
    handler: src/handlers/stayboard/listings.deleteHandler
    events:
      - httpApi:
          path: /api/app/listings/{id}
          method: delete
  appBookingsPost:
    handler: src/handlers/stayboard/bookings.postHandler
    events:
      - httpApi:
          path: /api/app/bookings
          method: post
  appBookingUpdate:
    handler: src/handlers/stayboard/bookings.updateBookingHandler
    events:
      - httpApi:
          path: /api/app/bookings/{bookingId}
          method: put
  appBookingExtend:
    handler: src/handlers/stayboard/bookings.extendBookingHandler
    events:
      - httpApi:
          path: /api/app/bookings/{bookingId}/extend
          method: post
  appBookingLookupPhone:
    handler: src/handlers/stayboard/bookings.lookupByPhoneHandler
    events:
      - httpApi:
          path: /api/app/bookings/lookup
          method: get
  appBookingCreateHousekeepingTask:
    handler: src/handlers/stayboard/bookings.createHousekeepingTaskHandler
    events:
      - httpApi:
          path: /api/app/bookings/{bookingId}/housekeeping-tasks
          method: post
  appBookingDelete:
    handler: src/handlers/stayboard/bookings.deleteBookingHandler
    events:
      - httpApi:
          path: /api/app/bookings/{bookingId}/delete
          method: post
  appBookingUploadPhoto:
    handler: src/handlers/stayboard/bookings.uploadBookingPhotoHandler
    events:
      - httpApi:
          path: /api/app/bookings/{bookingId}/photos
          method: post
  appHousekeepingComplete:
    handler: src/handlers/stayboard/housekeeping.submitTaskHandler
    events:
      - httpApi:
          path: /api/app/housekeeping/complete
          method: post
  appHousekeepingTasks:
    handler: src/handlers/stayboard/housekeeping.listTasksHandler
    events:
      - httpApi:
          path: /api/app/housekeeping/tasks
          method: get
  appHousekeepingTaskStart:
    handler: src/handlers/stayboard/housekeeping.startTaskHandler
    events:
      - httpApi:
          path: /api/app/housekeeping/tasks/{taskId}/start
          method: post
  appHousekeepingTaskSubmit:
    handler: src/handlers/stayboard/housekeeping.submitTaskHandler
    events:
      - httpApi:
          path: /api/app/housekeeping/tasks/{taskId}/submit
          method: post
  appHousekeepingTaskSkip:
    handler: src/handlers/stayboard/housekeeping.skipTaskHandler
    events:
      - httpApi:
          path: /api/app/housekeeping/tasks/{taskId}/skip
          method: post
  appHousekeepingTaskDelete:
    handler: src/handlers/stayboard/housekeeping.deleteTaskHandler
    events:
      - httpApi:
          path: /api/app/housekeeping/tasks/{taskId}/delete
          method: post
  appHousekeepingDailyReminder:
    handler: src/handlers/stayboard/housekeeping.dailyReminderHandler
    events:
      - schedule:
          rate: cron(30 2 * * ? *)
          enabled: true
  appVacantListingReminder:
    handler: src/handlers/stayboard/housekeeping.vacantListingReminderHandler
    events:
      - schedule:
          rate: rate(3 hours)
          enabled: true
  appPreflight:
    handler: src/handlers/preflight.handler
    events:
      - httpApi:
          path: /api/app/{proxy+}
          method: options

resources:
  Resources:
    StayboardDynamoTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: stayboard-${opt:stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
